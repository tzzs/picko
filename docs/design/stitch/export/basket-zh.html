<span class="font-label-caps text-label-caps mt-1">篮子</span>
</a>

<script>
        // Micro-interaction for feedback
        document.querySelectorAll('button, .group').forEach(el => {
            el.addEventListener('click', () => {
                // Potential haptic feedback trigger or sound effect
                console.log('Interaction detected');
            });
        });

        // Simple parallax on scroll for header summary
        window.addEventListener('scroll', () => {
            const summary = document.querySelector('.bg-surface-container-lowest');
            const scrolled = window.pageYOffset;
            if (summary) {
                summary.style.transform = `translateY(${scrolled * 0.05}px)`;
            }
        });
    </script>
