<style>

<body class="bg-surface font-body-md text-on-surface overflow-hidden">
<!-- Top Navigation Bar (Shared Component Strategy) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md flex justify-between items-center px-container-margin h-16 w-full">
<div class="flex items-center gap-stack-sm active:scale-95 transition-transform">

</div>

<h1 class="font-headline-md-mobile text-headline-md-mobile text-primary tracking-tight">复核</h1>
<span class="font-label-caps text-[10px] tracking-widest text-on-surface-variant">128 / 450</span>
</div>
<div class="flex items-center gap-stack-md">
<button class="active:scale-95 transition-transform hover:opacity-80">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center p-container-margin pt-20 pb-safe-area-bottom">
<!-- Swipe Visual Cues -->

<script>
        const card = document.getElementById('photo-card');
        let startY = 0;
        let currentY = 0;

        card.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            card.style.transition = 'none';
        });

        card.addEventListener('touchmove', (e) => {
            currentY = e.touches[0].clientY - startY;
            // Dampen movement
            const transformY = currentY * 0.5;
            card.style.transform = `translateY(${transformY}px) rotate(${transformY * 0.05}deg)`;
            
            // Visual feedback for keep/delete
            if (transformY < -50) {
                card.style.boxShadow = '0 0 40px rgba(0, 36, 52, 0.2)';
            } else if (transformY > 50) {
                card.style.boxShadow = '0 0 40px rgba(186, 26, 26, 0.2)';
            } else {
                card.style.boxShadow = '';
            }
        });

        card.addEventListener('touchend', () => {
            card.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            card.style.transform = 'translateY(0) rotate(0deg)';
            card.style.boxShadow = '';
        });

        // Simple desktop click simulation
        card.addEventListener('mousedown', (e) => {
            startY = e.clientY;
            const onMouseMove = (e) => {
                currentY = e.clientY - startY;
                card.style.transform = `translateY(${currentY * 0.3}px) rotate(${currentY * 0.02}deg)`;
            };
            const onMouseUp = () => {
                card.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                card.style.transform = 'translateY(0) rotate(0deg)';
                window.removeEventListener('mousemove', onMouseMove);
                window.removeEventListener('mouseup', onMouseUp);
            };
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        });
    </script>
