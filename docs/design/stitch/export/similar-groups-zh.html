<script>
        // Simple Interaction logic for Grid Selection
        document.querySelectorAll('.curation-item').forEach(item => {
            item.addEventListener('click', () => {
                const isSelected = item.getAttribute('data-selected') === 'true';
                const nextState = !isSelected;
                item.setAttribute('data-selected', nextState);

                const overlay = item.querySelector('.select-overlay');
                const check = item.querySelector('.select-check');
                const img = item.querySelector('img');

                if (nextState) {
                    overlay.classList.remove('bg-transparent');
                    overlay.classList.add('bg-secondary/20');
                    check.classList.remove('opacity-0');
                    check.classList.add('bg-secondary', 'text-on-secondary');
                    img.classList.remove('grayscale', 'opacity-60');
                } else {
                    overlay.classList.remove('bg-secondary/20');
                    overlay.classList.add('bg-transparent');
                    check.classList.add('opacity-0');
                    check.classList.remove('bg-secondary', 'text-on-secondary');
                    img.classList.add('opacity-60');
                }
            });
        });

        document.getElementById('deselectAllBtn').addEventListener('click', () => {
            document.querySelectorAll('.curation-item').forEach(item => {
                item.setAttribute('data-selected', 'false');
                item.querySelector('.select-overlay').className = 'absolute inset-0 bg-transparent transition-opacity duration-300 select-overlay';
                item.querySelector('.select-check').classList.add('opacity-0');
                item.querySelector('img').classList.add('opacity-60');
            });
        });
    </script>
