name: Picko
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
packages:
  PickoPackage:
    path: .
targets:
  Picko:
    type: application
    platform: iOS
    sources:
      - Apps/Picko/iOS
    dependencies:
      - package: PickoPackage
        product: PickoApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tanzz.Picko
        INFOPLIST_FILE: Apps/Picko/iOS/Info.plist
    info:
      path: Apps/Picko/iOS/Info.plist
      properties:
        CFBundleDisplayName: Picko
        NSPhotoLibraryUsageDescription: Picko needs photo library access to help you review and keep photos locally.
        NSPhotoLibraryAddUsageDescription: Picko uses Photos system confirmation before changing your library.
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
  PickoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/PickoTests
    dependencies:
      - target: Picko
      - package: PickoPackage
        product: PickoApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tanzz.PickoTests
        GENERATE_INFOPLIST_FILE: YES
  PickoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/PickoUITests
    dependencies:
      - target: Picko
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tanzz.PickoUITests
        GENERATE_INFOPLIST_FILE: YES
  PickoMac:
    type: application
    platform: macOS
    sources:
      - Apps/Picko/macOS
    dependencies:
      - package: PickoPackage
        product: PickoMacApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tanzz.PickoMac
        INFOPLIST_FILE: Apps/Picko/macOS/Info.plist
    info:
      path: Apps/Picko/macOS/Info.plist
      properties:
        CFBundleDisplayName: Picko
        NSPhotoLibraryUsageDescription: Picko needs photo library access to help you review and keep photos locally.
        NSPhotoLibraryAddUsageDescription: Picko uses Photos system confirmation before changing your library.
  PickoMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/PickoMacTests
    dependencies:
      - target: PickoMac
      - package: PickoPackage
        product: PickoMacApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tanzz.PickoMacTests
        GENERATE_INFOPLIST_FILE: YES
